name: Build Android

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.2.5
          
      - name: Install dependencies
        run: |
          haxelib setup ~/haxelib
          haxelib install lime 8.1.2
          haxelib install openfl 9.3.3
          haxelib install flixel 5.6.1
          haxelib install flixel-addons 3.2.1
          haxelib install flixel-ui 2.6.0
          haxelib install hscript 2.5.1
          haxelib install polymod 1.8.0
          haxelib install actuate 1.9.1
          haxelib git extension-webm https://github.com/KadeDev/extension-webm.git
          
      - name: Configure Lime
        run: |
          echo "$HOME/haxelib/lime/run/bin" >> $GITHUB_PATH
          haxelib run lime setup -y
          haxelib run lime setup flixel -y
          lime --version
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Setup Android NDK
        run: |
          sdkmanager "ndk;21.4.7075529" "platforms;android-29" "build-tools;29.0.3"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/21.4.7075529" >> $GITHUB_ENV
          
      - name: Build APK (Debug)
        run: |
          lime build android -debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sonic-Exe-V2-Android-Debug
          path: export/debug/android/bin/*.apk
          if-no-files-found: error